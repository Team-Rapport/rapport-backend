name: Deploy Spring Boot

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'spring/**'
      - '.github/workflows/deploy-spring.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        working-directory: spring
        run: ./gradlew bootJar

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "spring/build/libs/*.jar"
          target: "/home/ubuntu/rapport/spring/app.jar"
          strip_components: 3

      - name: Restart Spring container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ubuntu/rapport
            echo "${{ secrets.ENV_FILE }}" > .env
            docker compose restart spring