spring:
  application:
    name: rapport

  # ── 데이터소스 (기존 유지) ──────────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/rapport?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:rapport_user}
    password: ${SPRING_DATASOURCE_PASSWORD:rapport1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ── JPA (ddl-auto: update → validate 변경 — Flyway가 담당하므로) ──
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false
    open-in-view: false
    # defer-datasource-initialization: true 는 순환참조 에러를 유발하므로 삭제

  # ── DB 초기화 시점 설정 (JPA가 Flyway 이후에 작동하도록 강제) ──
  sql:
    init:
      mode: always

  # ── 신규: Flyway DB 마이그레이션 ────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── 신규: OAuth2 소셜 로그인 ─────────────────────────────────
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/api/v1/auth/oauth2/callback/{registrationId}"
          kakao:
            client-id: ${KAKAO_CLIENT_ID:}
            client-secret: ${KAKAO_CLIENT_SECRET:}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/api/v1/auth/oauth2/callback/{registrationId}"
            scope:
              - profile_nickname
              - account_email
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  # ── 신규: 이메일 발송 ──────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ── 서버 포트 (기존 유지) ────────────────────────────────────
server:
  port: 8080

# ── JWT (Access/Refresh 분리 — .env 기존 키와 일치시킴) ──────
jwt:
  secret: ${JWT_SECRET:rapport-local-dev-secret-key-must-be-at-least-32-characters}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:1800000}     # 30분
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7일

# ── 신규: 앱 공통 설정 ────────────────────────────────────────
app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  mail:
    from: ${MAIL_FROM:noreply@rapport.kr}
    from-name: "라포(Rapport)"
  ai-server-url: ${AI_SERVER_URL:http://localhost:8000}

# ── CORS (localhost:3000 → 5173으로 수정 — .env와 불일치 수정) ─
cors:
  allowed-origin: ${FRONTEND_ORIGIN:http://localhost:5173}

# ── Swagger (기존 유지) ───────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha

# ── 로깅 (기존 유지) ─────────────────────────────────────────
logging:
  level:
    root: INFO
    com.rapport: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG